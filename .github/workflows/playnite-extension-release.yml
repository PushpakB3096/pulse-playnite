# Builds a .pext and creates a draft GitHub Release on every push to master.
# Version is read from extension.yaml (e.g. 1.4.1 -> tag v1.4.1). Fails if that tag/release already exists.
name: Playnite extension (release)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: playnite-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    outputs:
      release_tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          fetch-tags: true

      - name: Read extension version
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $yaml = Get-Content -LiteralPath "extension.yaml" -Raw
          if ($yaml -notmatch '(?m)^Version:\s*(.+)$') {
            throw "Could not read Version from extension.yaml"
          }
          $version = $Matches[1].Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "extension.yaml Version is empty"
          }
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Extension version: $version (release tag: $tag)"

      - name: Fail if release or tag already exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ steps.version.outputs.tag }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $tag already exists. Bump Version in extension.yaml before merging to master."
          }
          git fetch --tags --force
          $existingTag = git tag -l $tag
          if ($existingTag) {
            throw "Git tag $tag already exists. Bump Version in extension.yaml before merging to master."
          }
          Write-Host "No existing release or tag for $tag."

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: NuGet restore
        run: nuget restore Pulse.sln -NonInteractive

      - name: MSBuild (Release)
        run: msbuild Pulse.sln /restore:false /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

      - name: Setup Playnite portable (Toolbox)
        id: playnite
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{
            "User-Agent" = "pulse-playnite-ci"
            Authorization = "Bearer $env:GH_TOKEN"
          }
          $rel = Invoke-RestMethod -Uri "https://api.github.com/repos/JosefNemec/Playnite/releases/latest" -Headers $headers
          $playniteTag = $rel.tag_name
          if ([string]::IsNullOrWhiteSpace($playniteTag)) { throw "Could not resolve latest Playnite release tag." }
          $archiveName = "$playniteTag.7z"
          $downloadUrl = "https://github.com/JosefNemec/Playnite/releases/download/$playniteTag/$archiveName"
          $playniteDir = Join-Path $PWD "_playnite"
          New-Item -ItemType Directory -Force -Path $playniteDir | Out-Null
          $archivePath = Join-Path $playniteDir $archiveName
          Write-Host "Downloading Playnite portable $playniteTag"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $archivePath -TimeoutSec 900
          $sevenZip = "C:\Program Files\7-Zip\7z.exe"
          if (-not (Test-Path $sevenZip)) { throw "7-Zip not found at $sevenZip" }
          & $sevenZip x $archivePath "-o$playniteDir" -y | Out-Host
          $toolbox = Get-ChildItem -Path $playniteDir -Recurse -Filter "Toolbox.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $toolbox) { throw "Toolbox.exe not found after extracting Playnite portable." }
          Write-Host "Toolbox=$($toolbox.FullName)"
          "toolbox_path=$($toolbox.FullName)" >> $env:GITHUB_OUTPUT

      - name: Pack .pext
        id: pack
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Toolbox = "${{ steps.playnite.outputs.toolbox_path }}"
          $built = Join-Path $PWD "bin\Release"
          if (-not (Test-Path $built)) { throw "Release output not found: $built" }
          $out = Join-Path $PWD "_pext"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          & $Toolbox pack $built $out
          $pext = Get-ChildItem -Path $out -Filter "*.pext" | Select-Object -First 1
          if (-not $pext) { throw "Toolbox did not produce a .pext in $out" }
          $tagName = "${{ steps.version.outputs.tag }}"
          $destName = "PlayLog-$tagName.pext"
          $dest = Join-Path $out $destName
          Copy-Item -LiteralPath $pext.FullName -Destination $dest -Force
          Write-Host "Packed: $dest"
          "pext_path=$dest" >> $env:GITHUB_OUTPUT
          "pext_name=$destName" >> $env:GITHUB_OUTPUT

      - name: Toolbox verify (installer manifest)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Toolbox = "${{ steps.playnite.outputs.toolbox_path }}"
          $ver = "${{ steps.version.outputs.version }}"
          $pextPath = "${{ steps.pack.outputs.pext_path }}"
          $pextName = "${{ steps.pack.outputs.pext_name }}"
          if (-not (Test-Path $pextPath)) { throw "Missing packed file: $pextPath" }

          $installerManifestPath = Join-Path $PWD "packaging\installer.yaml"
          if (-not (Test-Path $installerManifestPath)) {
            throw "Missing packaging/installer.yaml"
          }

          $pextDir = Split-Path -Parent $pextPath
          $port = 8765
          $server = Start-Process python -ArgumentList @("-m", "http.server", "$port", "--bind", "127.0.0.1") -WorkingDirectory $pextDir -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 2
          $pkgUrl = "http://127.0.0.1:$port/$pextName"

          try {
            $manifest = (Get-Content -Raw -LiteralPath $installerManifestPath) -replace "`r`n", "`n"
            if ($manifest -notmatch "(?m)^  - Version: $([regex]::Escape($ver))$") {
              throw "packaging/installer.yaml has no Packages entry for version $ver"
            }

            $pattern = "(?ms)(  - Version: $([regex]::Escape($ver))\r?\n(?:.*?\r?\n)*?    PackageUrl: ).*"
            $verifyManifest = [regex]::Replace($manifest, $pattern, "`${1}$pkgUrl", 1)
            $verifyPath = Join-Path $PWD "_installer-verify.yaml"
            Set-Content -Path $verifyPath -Value $verifyManifest -Encoding utf8
            Write-Host "Verifying installer manifest with draft-local PackageUrl: $pkgUrl"
            Get-Content $verifyPath
            & $Toolbox verify installer $verifyPath
          }
          finally {
            if ($server -and -not $server.HasExited) {
              Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Create draft GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $pext = "${{ steps.pack.outputs.pext_path }}"
          $tag = "${{ steps.version.outputs.tag }}"
          if (-not (Test-Path $pext)) { throw "Missing packed file: $pext" }
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $tag already exists (race or duplicate run)."
          }
          gh release create $tag $pext --draft --title $tag --target "${{ github.sha }}"
          Write-Host "Created draft release $tag with ${{ steps.pack.outputs.pext_name }}"

      - name: Toolbox verify (add-on manifest for store PR)
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Toolbox = "${{ steps.playnite.outputs.toolbox_path }}"
          $sha = "${{ github.sha }}"
          $repo = "${{ github.repository }}"
          $installerUrl = "https://raw.githubusercontent.com/$repo/$sha/packaging/installer.yaml"
          $sourceUrl = "https://github.com/$repo"
          $addonPath = Join-Path $PWD "packaging\playnite-addon-database.yaml"
          $content = Get-Content -Raw -Path $addonPath
          $content = $content.Replace("INSTALLER_MANIFEST_URL", $installerUrl).Replace("SOURCE_REPO_URL", $sourceUrl)
          Set-Content -Path "_addon-verify.yaml" -Value $content -Encoding utf8
          & $Toolbox verify addon (Join-Path $PWD "_addon-verify.yaml")

  update-installer-yaml:
    needs: windows
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Merge release into packaging/installer.yaml and push
        env:
          ADDON_ID: Pulse_d1ac11bf-1668-455f-ad91-6fdb334a54c5
          GITHUB_REF_NAME: ${{ needs.windows.outputs.release_tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REQUIRED_API_VERSION: "6.13.0"
        run: |
          set -euo pipefail
          BRANCH="master"
          git pull origin "$BRANCH" --ff-only
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="$GITHUB_REF_NAME"
          PKG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/PlayLog-${TAG}.pext"
          RELEASE_DATE=$(date -u +%Y-%m-%d)
          export VERSION RELEASE_DATE PACKAGE_URL="$PKG_URL"
          python scripts/update_installer_manifest.py
          if [ -z "$(git status --porcelain packaging/installer.yaml)" ]; then
            echo "No changes to packaging/installer.yaml (version may already be listed)."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packaging/installer.yaml
          git commit -m "chore: update installer manifest for ${TAG} [skip ci]"
          git push origin "HEAD:${BRANCH}"
