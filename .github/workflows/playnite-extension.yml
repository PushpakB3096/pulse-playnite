# Branch/PR compile-only CI. Pushes to master also run playnite-extension-release.yml (pack + draft release).
name: Playnite extension (CI)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: playnite-extension-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: NuGet restore
        run: nuget restore Pulse.sln -NonInteractive

      - name: MSBuild (Release)
        run: msbuild Pulse.sln /restore:false /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

      - name: CI only — compile check
        run: |
          echo "::notice title=Compile-only CI::On push to master, the separate workflow 'Playnite extension (release)' builds the .pext and creates a draft GitHub Release from extension.yaml Version."
